name: web (Vercel deploy)

# 网页端部署到 Vercel。
# 推荐:在 Vercel 控制台直接导入 GitHub 仓库(Vercel 会自动在 push 时部署),
# 根目录 vercel.json 已配好 build/output。这个 workflow 是“显式部署”的可选备份,
# 需要 VERCEL_TOKEN 与 VERCEL_ORG_ID / VERCEL_PROJECT_ID 三个 secret。
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @tilemo/web build
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --yes --prod --cwd apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
