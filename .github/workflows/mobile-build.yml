name: mobile (APK release)

# 打 tag(v*) 时，在 GitHub runner 上本地构建 Android release APK，
# 并把它作为制品挂到对应的 GitHub Release 上。
# 纯本地构建：不依赖 EAS / Expo 账号额度，制品完整留在仓库 Release 页。
#
# 签名说明：默认用 debug keystore 签名(APK 可直接侧载安装)。
#   若需要"跨版本可覆盖升级"的稳定签名，把一个 release keystore 的
#   base64 和口令存为仓库 Secret，再启用下方 "签名(可选)" 步骤即可。
#
# 触发：推送 v* tag（git tag v10 && git push origin v10），
#       或在 Actions 页手动运行(workflow_dispatch)。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # gh release create 需要写权限

jobs:
  build-android:
    name: Build APK & publish Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # --generate-notes 需要完整历史

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK + NDK + CMake
        uses: android-actions/setup-android@v3
        with:
          accept-android-licenses: true
      # reanimated 的原生层用 CMake，必须装 NDK(27.1.12297006, 见 RN libs.versions.toml)
      # 和它锁定的 CMake 3.22.1。
      - name: Install NDK + CMake
        run: |
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # CNG：生成原生 android 工程(临时产物，构建完即弃)
      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install

      # release 默认用 debug keystore 签名；若模板未带则现场生成，保证构建不中断
      - name: Ensure debug keystore exists
        working-directory: apps/mobile/android
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        id: apk
        working-directory: .
        run: |
          TAG="${GITHUB_REF_NAME}"
          SRC="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          test -f "$SRC" || { echo "APK 未找到: $SRC"; ls -R apps/mobile/android/app/build/outputs || true; exit 1; }
          # tag 推送时用 tag 名；手动触发(分支)时用 run 号，避免建出以分支命名的 release
          if [[ "$TAG" != v* ]]; then TAG="manual-${GITHUB_RUN_NUMBER}"; fi
          OUT="tilemo-${TAG}.apk"
          cp "$SRC" "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT"

      # 总是留一份 workflow artifact：手动触发或 release 失败时也能下载到 APK
      - name: Upload APK (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk }}
          path: ${{ steps.apk.outputs.apk }}
          if-no-files-found: error

      # 仅在 v* tag 推送时，创建/更新 GitHub Release 并挂上 APK
      - name: Create GitHub Release & upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.apk.outputs.tag }}"
          APK="${{ steps.apk.outputs.apk }}"
          # 若该 tag 已有 release(重跑)，则用 upload --clobber 覆盖制品
          gh release create "$TAG" "$APK" \
            --title "Tilemo $TAG" --generate-notes \
            || gh release upload "$TAG" "$APK" --clobber
